services:
  # BACKEND ####################################################################
  milvus-etcd:
    container_name: licodex-milvus-etcd
    image: quay.io/coreos/etcd:v3.5.0
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
      - ETCD_SNAPSHOT_COUNT=50000
    volumes:
      - licodex-milvus-etcd:/etcd
    # IMPORTANT: advertise a host reachable by other containers (NOT 127.0.0.1)
    # If we advertise 127.0.0.1 Milvus will follow redirects to its own loopback and fail.
    command: etcd -advertise-client-urls=http://milvus-etcd:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd
    healthcheck:
      test: ["CMD", "etcdctl", "--endpoints=http://127.0.0.1:2379", "endpoint", "health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - licodex

  milvus-minio:
    container_name: licodex-milvus-minio
    image: minio/minio:RELEASE.2023-03-20T20-16-18Z
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - licodex-milvus-minio:/data
    command: minio server /data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - licodex

  milvus:
    build:
      context: .
      dockerfile: src/licodex/milvus/Dockerfile
    image: ghcr.io/diogobaltazar/licodex-milvus:1.0.0
    container_name: licodex-milvus
    environment:
      # Use explicit service names (no network aliases required)
      # Service 'milvus-etcd' exposes client port 2379
      ETCD_ENDPOINTS: milvus-etcd:2379
      # Service 'milvus-minio' exposes port 9000
      MINIO_ADDRESS: milvus-minio:9000
      DEPLOYMENT_ENV: ${DEPLOYMENT_ENV:-}
    volumes:
      - licodex-milvus:/var/lib/milvus
    ports:
      - "19530:19530" # grpc, http
      - "9091:9091" # monitoring
    depends_on:
      milvus-etcd:
        condition: service_healthy
      milvus-minio:
        condition: service_started
    networks:
      - licodex

  db:
    build:
      context: .
      dockerfile: src/licodex/db/Dockerfile
    image: licodex-db:1.0.0
    container_name: licodex-db
    restart: unless-stopped
    environment:
      # Postgres image consumes these; defaults also baked into Dockerfile but we keep explicit for clarity
      POSTGRES_USER: licodex
      POSTGRES_PASSWORD: licodexpwd
      POSTGRES_DB: licodex
    volumes:
      - licodex-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    # IMPORTANT: place db on the same user-defined network as api so hostname 'db' resolves inside api container
    networks:
      - licodex

  api:
    build:
      context: .
      dockerfile: src/licodex/api/Dockerfile
    image: licodex-api:1.0.0
    container_name: licodex-api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      mcp:
        condition: service_started
      otel-collector:
        condition: service_started
    ports:
      - "8000:8000"
    environment:
      - MODELHUB_API_KEY
      - MODELHUB_BASE_URL
      - MODELHUB
      - OTEL_SERVICE_NAME=licodex-api
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4318
      - OTEL_TRACES_SAMPLER=parentbased_always_on
      - OTEL_EXPORTER_OTLP_INSECURE=true
    env_file:
      - .env
    networks:
      - licodex

  mcp:
    build:
      context: .
      dockerfile: src/licodex/mcp/Dockerfile
    image: licodex-mcp:1.0.0
    container_name: licodex-mcp
    restart: unless-stopped
    environment:
      - CHUNK_POLICY_MODEL_PATH
    networks:
      - licodex

  # FRONTEND ###################################################################
  web:
    build:
      context: .
      dockerfile: src/licodex/client/web/Dockerfile
    image: licodex-web:1.0.0
    container_name: licodex-web
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "5173:80"
    networks:
      - licodex

  # OBSERVABILITY ##############################################################
  loki:
    image: grafana/loki:2.9.4
    container_name: licodex-loki
    command: -config.file=/etc/loki/config.yml
    volumes:
      - ./src/licodex/observability/loki/config.yml:/etc/loki/config.yml:ro
      - licodex-loki-data:/loki
    ports:
      - "3100:3100"
    networks:
      - licodex

  # Log forwarder/shipper
  #
  # Tails Docker container logs on the host, parses JSON, adds basic labels, and
  # pushes logs into Loki for centralized search and retention.
  fluent-bit:
    image: fluent/fluent-bit:2.1.8
    container_name: licodex-fluent-bit
    environment:
      DEPLOYMENT_ENV: ${DEPLOYMENT_ENV:-local}
    volumes:
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./src/licodex/observability/fluent-bit/fluent-bit.conf:/fluent-bit/etc/fluent-bit.conf:ro
      - ./src/licodex/observability/fluent-bit/parsers.conf:/fluent-bit/etc/parsers.conf:ro
    depends_on:
      - loki
    networks:
      - licodex

  # Distributed tracing backend
  #
  # Stores traces sent via OTLP (through the OTEL Collector). Lets you view
  # request spans/timelines in Grafana and correlate them with logs/metrics.
  tempo:
    image: grafana/tempo:2.2.2
    container_name: licodex-tempo
    command: -config.file=/etc/tempo/tempo.yml
    volumes:
      - ./src/licodex/observability/tempo/tempo.yml:/etc/tempo/tempo.yml:ro
      - licodex-tempo-data:/var/tempo
    ports:
      - "3200:3200"
    networks:
      - licodex

  # Vendor‑neutral telemetry router
  #
  # Receives OTLP data (traces and custom metrics) from the API SDKs/clients,
  # batches and exports traces to Tempo and metrics to Prometheus (and logs to
  # its console for debugging).
  otel-collector:
    image: otel/opentelemetry-collector:0.93.0
    container_name: licodex-otel-collector
    command:
      - "--config=/etc/otelcol/config.yaml"
    volumes:
      - ./src/licodex/observability/otel-collector/config.yaml:/etc/otelcol/config.yaml:ro
    ports:
      - "4317:4317"
      - "4318:4318"
      - "8889:8889"
    depends_on:
      - tempo
    networks:
      - licodex

  # Metrics collection and storage
  #
  # Scrapes /metrics endpoints (API, Milvus, OTEL collector), stores time series
  # and powers Grafana metric queries and alerting rules.
  prometheus:
    image: prom/prometheus:v2.48.0
    container_name: licodex-prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
    volumes:
      - ./src/licodex/observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - licodex-prometheus-data:/prometheus
    ports:
      - "9090:9090"
    depends_on:
      - otel-collector
    networks:
      - licodex

# Visualization and dashboards
#
# Connects to Prometheus (metrics), Loki (logs), and Tempo (traces). Use it to
# build panels, explore queries, and correlate logs/metrics/traces via labels
# like trace_id
  grafana:
    image: grafana/grafana:10.2.3
    container_name: licodex-grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "true"
    volumes:
      - licodex-grafana-data:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
      - loki
      - tempo
    networks:
      - licodex

volumes:
  licodex-db-data:
    name: licodex-db-data
  licodex-milvus:
    name: licodex-milvus
  licodex-milvus-minio:
    name: licodex-milvus-minio
  licodex-milvus-etcd:
    name: licodex-milvus-etcd
  licodex-loki-data:
    name: licodex-loki-data
  licodex-prometheus-data:
    name: licodex-prometheus-data
  licodex-tempo-data:
    name: licodex-tempo-data
  licodex-grafana-data:
    name: licodex-grafana-data

networks:
  licodex:
    name: licodex
    external: true
