services:
  pg:
    build:
      context: .
      dockerfile: src/licodex/db/Dockerfile
    image: licodex-pg:1.0.0
    container_name: licodex-pg
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: src/licodex/api/Dockerfile
    image: licodex-api:1.0.0
    container_name: licodex-api
    restart: unless-stopped
    ports:
      - "8000:8000"

networks:
  licodex:
    name: licodex
    external: true