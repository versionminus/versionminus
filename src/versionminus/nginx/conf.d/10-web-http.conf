# versionminus public entry (HTTP only)
#
# Purpose
# - Serve ACME http-01 challenges from /var/www/html
# - Proxy normal traffic to the internal web app at versionminus-web:80
# - Keep HTTP available so we can obtain certificates first. After certs are
#   issued, enable the HTTPS config (see 20-web-https.conf.template) and switch
#   to HTTP->HTTPS redirects.

server {
  listen 80;
  listen [::]:80;
  server_name versionminus.com www.versionminus.com;

  # ACME challenge location (shared volume mounted at /var/www/html)
  location /.well-known/acme-challenge/ {
    root /var/www/html;
  }

  # Proxy all other requests to the app container
  location / {
    proxy_pass http://versionminus-web:80;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}

